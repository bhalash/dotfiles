- clean: ['~', '~/.config/alacritty']
- create:
  - ~/.config
  - ~/.config/alacritty
  - ~/.config/dotfiles
- link:
    ~/.config/broot: broot
    ~/.config/nvim: nvim
    ~/.gitconfig: git/gitconfig
    ~/.tigrc: tig/tigrc
    ~/.tmux.conf: tmux/tmux.conf
    ~/.tmux: tmux
    ~/.zsh: zsh
    ~/.zshenv: zsh/zshenv
    ~/.zshrc: zsh/zshrc
    ~/.config/alacritty/alacritty.toml: alacritty/linux.toml
- shell:
  - [touch ~/.config/dotfiles/zsh && chmod 600 ~/.config/dotfiles/zsh, Create private zshrc]
  - [git submodule update --init --recursive, Install git submodules]
